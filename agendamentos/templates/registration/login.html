<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Consultório</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; height: 100vh; display: flex; align-items: center; }
        .login-card { 
            background: white; padding: 40px; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; 
        }
        .btn-login { border-radius: 30px; padding: 12px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center">
    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">🦷 Consultório</h2>
            <p class="text-muted">Acesse sua agenda</p>
        </div>

        <form method="post">
            {% csrf_token %}
            {% if form.errors %}
                <div class="alert alert-danger small">Usuário ou senha incorretos.</div>
            {% endif %}
            
            <div class="mb-3">
                <label class="form-label small fw-bold">Usuário</label>
                <input type="text" name="username" class="form-control" placeholder="Seu usuário" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Senha</label>
                <input type="password" name="password" class="form-control" placeholder="********" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-login w-100 shadow-sm">Entrar no Sistema</button>
        </form>
    </div>
</div>
</body>
</html>
