<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | OdontoClean</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #2d3436;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-gradient: linear-gradient(135deg, #0f1113 0%, #1e2125 100%);
                --card-bg: rgba(30, 33, 37, 0.95);
                --text-main: #f8f9fa;
            }
        }

        body { 
            background: var(--bg-gradient); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        .login-card { 
            background: var(--card-bg); 
            padding: 50px 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.15); 
            width: 100%; 
            max-width: 420px; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-logo {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            background: rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        [data-theme="dark"] .form-control {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
            color: white;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.15);
            border-color: #0d6efd;
            background: white;
        }

        .btn-login { 
            border-radius: 12px; 
            padding: 14px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.3);
        }

        .input-group-text {
            background: transparent;
            border-right: none;
            color: #6c757d;
        }

        .form-floating > label {
            padding-left: 10px;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="login-card animate__animated animate__zoomIn">
        <div class="text-center mb-5">
            <div class="brand-logo">🦷</div>
            <h2 class="fw-bold m-0" style="letter-spacing: -1px;">Odonto<span class="text-primary">Clean</span></h2>
            <p class="text-muted small">Gestão Clínica Inteligente</p>
        </div>

        <form method="post">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="alert alert-danger border-0 small animate__animated animate__shakeX" style="border-radius: 10px;">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> Usuário ou senha incorretos.
                </div>
            {% endif %}
            
            <div class="mb-3">
                <label class="form-label small fw-bold opacity-75">USUÁRIO</label>
                <div class="input-group">
                    <span class="input-group-text border-end-0" style="border-radius: 12px 0 0 12px; background: rgba(0,0,0,0.03);"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control border-start-0" 
                           placeholder="Ex: dr_silva" style="border-radius: 0 12px 12px 0;" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <div class="d-flex justify-content-between">
                    <label class="form-label small fw-bold opacity-75">SENHA</label>
                    <a href="#" class="text-primary text-decoration-none small fw-bold">Esqueceu?</a>
                </div>
                <div class="input-group">
                    <span class="input-group-text border-end-0" style="border-radius: 12px 0 0 12px; background: rgba(0,0,0,0.03);"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control border-start-0" 
                           placeholder="••••••••" style="border-radius: 0 12px 12px 0;" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-login w-100 mb-3 shadow-sm">
                Entrar no Sistema <i class="bi bi-arrow-right-short fs-5 align-middle"></i>
            </button>
            
            <p class="text-center text-muted small mb-0">
                &copy; 2026 OdontoClean. Todos os direitos reservados.
            </p>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
