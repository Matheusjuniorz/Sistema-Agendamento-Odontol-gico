<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Dentista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; display: flex; align-items: center; min-height: 100vh; }
        .form-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="form-card">
            <h2 class="text-secondary mb-4 text-center">🩺 Novo Dentista</h2>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted">{{ field.label }}</label>
                        {{ field }}
                        <script>
                            // Adiciona a classe do bootstrap em todos os inputs automaticamente
                            document.getElementsByName("{{ field.name }}")[0].classList.add("form-control");
                        </script>
                    </div>
                {% endfor %}
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary shadow-sm" style="border-radius: 30px; font-weight: bold;">Salvar Profissional</button>
                    <a href="{% url 'index' %}" class="btn btn-link text-muted">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
