{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdontoClean | Gestão Inteligente</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --bg-body: #f8f9fa;
            --bg-navbar: #ffffff;
            --text-main: #212529;
            --primary-blue: #0d6efd;
            --border-color: #e9ecef;
            --nav-link: #495057;
        }

        [data-theme="dark"] {
            --bg-body: #121416;
            --bg-navbar: #1e2125;
            --text-main: #f8f9fa;
            --primary-blue: #3d8bfd;
            --border-color: #373b3e;
            --nav-link: #adb5bd;
        }

        body { 
            background-color: var(--bg-body); 
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            transition: background 0.3s ease;
        }

        /* Navbar Moderna */
        .navbar {
            background-color: var(--bg-navbar) !important;
            border-bottom: 1px solid var(--border-color);
            padding: 15px 0;
        }

        .navbar-brand {
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            color: var(--primary-blue) !important;
        }

        .nav-link {
            color: var(--nav-link) !important;
            font-weight: 600;
            transition: 0.2s;
            margin: 0 5px;
        }

        .nav-link:hover {
            color: var(--primary-blue) !important;
        }

        /* Botão de Tema na Nav */
        .theme-toggle-nav {
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-main);
            transition: 0.3s;
        }

        .theme-toggle-nav:hover {
            background: var(--primary-blue);
            color: white;
        }

        main { min-height: 80vh; padding-top: 20px; }

        footer { border-top: 1px solid var(--border-color); margin-top: 50px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'index' %}">
                <i class="bi bi-capsule-pill"></i> Odonto<span class="text-dark-emphasis">Clean</span>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'index' %}"><i class="bi bi-calendar3 me-1"></i> Agenda</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'lista_pacientes' %}"><i class="bi bi-people me-1"></i> Pacientes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'lista_dentistas' %}"><i class="bi bi-person-badge me-1"></i> Equipe</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-3">
                    <button class="theme-toggle-nav" id="themeBtn">
                        <i class="bi bi-moon-stars" id="themeIcon"></i>
                    </button>

                    <div class="dropdown">
                        <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle text-main" data-bs-toggle="dropdown">
                            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-2" style="width: 35px; height: 35px;">
                                {{ user.username|first|upper }}
                            </div>
                            <span class="fw-semibold d-none d-sm-inline">{{ user.username }}</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-3">
                            <li><a class="dropdown-item" href="{% url 'perfil' %}"><i class="bi bi-gear me-2"></i>Configurações</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form action="{% url 'logout' %}" method="post">
                                    {% csrf_token %}
                                    <button type="submit" class="dropdown-item text-danger"><i class="bi bi-box-arrow-right me-2"></i>Sair</button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center py-4">
        <p class="text-muted small m-0">&copy; 2026 <strong>OdontoClean</strong> - Sistema de Gestão Profissional</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const themeBtn = document.getElementById('themeBtn');
        const themeIcon = document.getElementById('themeIcon');
        const html = document.documentElement;

        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        updateIcon(savedTheme);

        themeBtn.addEventListener('click', () => {
            let currentTheme = html.getAttribute('data-theme');
            let newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon(newTheme);
        });

        function updateIcon(theme) {
            if (theme === 'dark') {
                themeIcon.className = 'bi bi-sun-fill';
            } else {
                themeIcon.className = 'bi bi-moon-stars-fill';
            }
        }
    </script>
</body>
</html>
