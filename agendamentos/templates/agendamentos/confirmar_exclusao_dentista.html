{% extends 'agendamentos/base.html' %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="card shadow-lg border-0 overflow-hidden" style="max-width: 450px; border-radius: 20px;">
        <div class="bg-danger py-2"></div>
        
        <div class="card-body p-5 text-center">
            <div class="mb-4">
                <div class="display-1 text-danger animate__animated animate__pulse animate__infinite">
                    <i class="bi bi-exclamation-octagon"></i>
                </div>
            </div>

            <h3 class="fw-bold mb-3">Confirmar Exclusão</h3>
            
            <p class="text-secondary mb-4">
                Você está prestes a remover o registro de <br>
                <span class="badge bg-danger-subtle text-danger fs-6 mt-2">
                    Dr(a). {{ dentista.nome }}
                </span>
            </p>

            <div class="alert alert-warning border-0 small py-2" style="border-radius: 10px;">
                <i class="bi bi-info-circle me-1"></i> Esta ação é irreversível.
            </div>

            <form method="post" class="mt-4">
                {% csrf_token %}
                <div class="d-grid gap-3">
                    <button type="submit" class="btn btn-danger py-3 fw-bold shadow-sm" style="border-radius: 12px;">
                        <i class="bi bi-trash3 me-2"></i> Sim, Excluir Cadastro
                    </button>
                    
                    <a href="{% url 'lista_dentistas' %}" class="btn btn-link text-muted text-decoration-none fw-semibold">
                        Não, manter registro
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    /* Animação suave para o ícone */
    @keyframes pulse-danger {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
        100% { transform: scale(1); opacity: 1; }
    }
    .animate__pulse {
        animation: pulse-danger 2s infinite ease-in-out;
    }

    /* Ajuste para o Dark Mode não deixar o card "sumir" no fundo */
    [data-theme="dark"] .card {
        border: 1px solid var(--border-color) !important;
        box-shadow: 0 15px 35px rgba(0,0,0,0.4) !important;
    }
</style>
{% endblock %}
