<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Pacientes - Consultório</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; padding-top: 30px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .table thead { background-color: #198754; color: white; }
        /* Estilo extra para os botões ficarem mais clicáveis */
        .btn-sm { border-radius: 8px; transition: 0.2s; }
        .btn-sm:hover { transform: scale(1.05); }
    </style>
</head>
<body>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-success">👥 Lista de Pacientes</h2>
        <a href="{% url 'index' %}" class="btn btn-outline-secondary">← Voltar para Agenda</a>
    </div>

    <div class="card p-4">
        <form method="GET" class="d-flex mb-3" style="max-width: 400px;">
            <input type="text" name="search" class="form-control" placeholder="Buscar por nome..." value="{{ request.GET.search }}">
            <button type="submit" class="btn btn-success ms-2">🔎</button>
        </form>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Idade</th>
                        <th>CPF</th>
                        <th>Telefone</th>
                        <th>E-mail</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for paciente in pacientes %}
                    <tr>
                        <td class="fw-bold">{{ paciente.nome }}</td>
                        <td>{{ paciente.idade }} anos</td>
                        <td class="text-muted small">{{ paciente.cpf }}</td>
                        <td>{{ paciente.telefone }}</td>
                        <td>{{ paciente.email }}</td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-2">
                                <a href="{% url 'editar_paciente' paciente.pk %}" class="btn btn-sm btn-outline-warning" title="Editar">
                                    ✏️
                                </a>
                                
                                <a href="{% url 'excluir_paciente' paciente.pk %}" class="btn btn-sm btn-outline-danger" title="Excluir">
                                    🗑️
                                </a>
                            </div>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="6" class="text-center py-4 text-muted">Nenhum paciente encontrado.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
