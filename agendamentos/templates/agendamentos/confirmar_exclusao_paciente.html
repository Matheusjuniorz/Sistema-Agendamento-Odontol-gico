{% extends 'agendamentos/base.html' %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 75vh;">
    <div class="delete-card shadow-lg animate__animated animate__fadeIn">
        <div class="danger-line"></div>
        
        <div class="p-5 text-center">
            <div class="icon-box mb-4">
                <i class="bi bi-person-x-fill display-3 text-danger"></i>
            </div>
            
            <h3 class="fw-bold mb-3">Excluir Prontuário?</h3>
            
            <div class="patient-info-box mb-4">
                <p class="text-muted mb-1 small text-uppercase fw-bold">Paciente selecionado</p>
                <h4 class="text-danger fw-bold m-0">{{ paciente.nome }}</h4>
            </div>

            <div class="alert alert-danger-subtle border-0 py-2 mb-4" style="border-radius: 12px;">
                <p class="small text-danger m-0">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i>
                    Atenção: Esta ação é definitiva e apagará todo o histórico clínico.
                </p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="d-grid gap-3">
                    <button type="submit" class="btn btn-danger btn-lg py-3 fw-bold shadow-sm action-btn">
                        <i class="bi bi-trash3 me-2"></i> Confirmar Exclusão
                    </button>
                    <a href="{% url 'lista_pacientes' %}" class="btn btn-link text-muted text-decoration-none fw-semibold">
                        <i class="bi bi-arrow-left me-1"></i> Desistir e voltar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    /* Estilização "Abusada" do Card */
    .delete-card {
        background: var(--bg-card); /* Usa a variável do Dark Mode */
        border-radius: 24px;
        overflow: hidden;
        width: 100%;
        max-width: 480px;
        position: relative;
        transition: transform 0.3s ease;
        border: 1px solid var(--border-color);
    }

    .delete-card:hover {
        transform: translateY(-5px);
    }

    .danger-line {
        height: 8px;
        background: linear-gradient(90deg, #dc3545, #ff4d5e);
    }

    .icon-box {
        background: rgba(220, 53, 69, 0.1);
        width: 100px;
        height: 100px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
    }

    .patient-info-box {
        background: var(--bg-body);
        padding: 15px;
        border-radius: 15px;
        border: 1px dashed var(--border-color);
    }

    .action-btn {
        border-radius: 15px;
        transition: 0.3s;
        border: none;
    }

    .action-btn:hover {
        background: #bd2130;
        letter-spacing: 0.5px;
        box-shadow: 0 8px 20px rgba(220, 53, 69, 0.4) !important;
    }

    /* Animação de entrada */
    .animate__fadeIn {
        animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
    }

    /* Ajuste para o Dark Mode */
    [data-theme="dark"] .alert-danger-subtle {
        background-color: rgba(220, 53, 69, 0.2);
        color: #ff8585;
    }
</style>
{% endblock %}
