<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Exclusão - {{ paciente.nome }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; min-height: 100vh; display: flex; align-items: center; }
        .delete-card { 
            background: white; padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px;
            border-top: 10px solid #dc3545;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="delete-card text-center">
        <div class="mb-4">
            <span style="font-size: 50px;">⚠️</span>
        </div>
        <h3 class="fw-bold text-dark">Confirmar Exclusão?</h3>
        <p class="text-muted">
            Você está prestes a excluir o prontuário de <br>
            <strong class="text-danger">{{ paciente.nome }}</strong>.
        </p>
        <p class="small text-secondary">
            Esta ação removerá todos os dados do paciente e não pode ser desfeita.
        </p>

        <form method="post">
            {% csrf_token %}
            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-danger fw-bold p-3 shadow-sm">
                    Sim, excluir agora
                </button>
                <a href="{% url 'lista_pacientes' %}" class="btn btn-light text-muted">
                    Não, manter paciente
                </a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
